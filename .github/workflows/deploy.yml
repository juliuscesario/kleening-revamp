name: Deploy Production

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies & Build
        run: |
          npm install
          npm run build

      - name: Deploy to Server via Rsync
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_TARGET: ${{ secrets.SSH_TARGET }}
        run: |
          mkdir -p ~/.ssh
          # Use printf to handle the multiline secret safely and ensure a trailing newline
          printf "%s\n" "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # Verify if the key is readable (this will show in logs if it fails)
          ssh-keygen -l -f ~/.ssh/id_rsa || echo "ERROR: Key is still invalid!"
          
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts
          
          rsync -rltvzc -e "ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa" ./ "$SSH_USER@$SSH_HOST:$SSH_TARGET" \
            --exclude=/node_modules/ \
            --exclude=/vendor/ \
            --exclude=/storage/ \
            --exclude=/public/storage \
            --exclude=/.git/ \
            --exclude=/.github/ \
            --exclude=/.env \
            --exclude=/public/hot \
            --exclude=/bootstrap/cache/

      - name: Post-deployment Commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ secrets.SSH_TARGET }}
            
            # 1. Update Permissions (Ensures web server can still read files)
            sudo chown -R www-data:www-data .
            sudo chmod -R 775 storage bootstrap/cache
            
            # 2. Update PHP dependencies
            composer install --no-dev --optimize-autoloader
            
            # 3. Housekeeping
            php artisan migrate --force
            php artisan storage:link
            php artisan optimize:clear
            php artisan optimize
