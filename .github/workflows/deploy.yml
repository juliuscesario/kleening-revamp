name: Deploy Production

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies & Build
        run: |
          npm install
          npm run build

      - name: Deploy to Server via Rsync
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_TARGET: ${{ secrets.SSH_TARGET }}
        run: |
          mkdir -p ~/.ssh
          
          # Safely decode the Base64 key to avoid formatting issues
          if echo "$SSH_PRIVATE_KEY_B64" | grep -q "BEGIN OPENSSH PRIVATE KEY"; then
            echo "Warning: Key was not Base64 encoded. Attempting to fix line endings..."
            echo "$SSH_PRIVATE_KEY_B64" | tr -d '\r' > ~/.ssh/id_rsa
          else
            echo "$SSH_PRIVATE_KEY_B64" | base64 -d > ~/.ssh/id_rsa
          fi
          
          chmod 600 ~/.ssh/id_rsa
          
          # Verify key format
          ssh-keygen -l -f ~/.ssh/id_rsa || (echo "ERROR: Key is still invalid! Check if you pasted the PRIVATE key (multiline) and not the PUBLIC key (one line)." && exit 1)
          
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts
          
          # -O: Omit directory times (prevents permission errors on the target folder itself)
          # -rltvzc: recursive, links, times, verbose, compress, checksum
          rsync -rltvzcO -e "ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa" ./ "$SSH_USER@$SSH_HOST:$SSH_TARGET/" \
            --exclude=/node_modules/ \
            --exclude=/vendor/ \
            --exclude=/storage/ \
            --exclude=/public/storage \
            --exclude=/.git/ \
            --exclude=/.github/ \
            --exclude=/.env \
            --exclude=/public/hot \
            --exclude=/bootstrap/cache/

      - name: Run Post-deployment Commands
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          # Use single quotes for EOF to prevent local environment variables from being substituted
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa "$SSH_USER@$SSH_HOST" << 'EOF'
            # Use the target from secrets directly to avoid expansion issues
            cd /var/www/kleening-revamp
            
            # 1. Update Permissions
            sudo chown -R panjul:www-data .
            sudo chmod -R 775 storage bootstrap/cache
            
            # 2. Update PHP dependencies
            composer install --no-dev --optimize-autoloader
            
            # 3. Housekeeping
            sudo php artisan migrate --force
            sudo php artisan storage:link
            sudo php artisan optimize:clear
            sudo php artisan optimize
          EOF
