name: Deploy Production

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies & Build
        run: |
          npm install
          npm run build

      - name: Deploy to Server
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: "-rltvzc"
          SOURCE: "./"
          REMOTE_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_USER: ${{ secrets.SSH_USER }}
          TARGET: ${{ secrets.SSH_TARGET }}
          # Use a single line for EXCLUDE to prevent shell interpretation errors
          EXCLUDE: "/node_modules/, /vendor/, /storage/, /public/storage, /.git/, /.github/, /.env, /public/hot, /bootstrap/cache/"

      - name: Post-deployment Commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ secrets.SSH_TARGET }}
            
            # 1. Update Permissions (Ensures www-data can read/write)
            chown -R www-data:www-data .
            chmod -R 775 storage bootstrap/cache
            
            # 2. Update PHP dependencies
            composer install --no-dev --optimize-autoloader
            
            # 3. Housekeeping
            php artisan migrate --force
            php artisan storage:link
            php artisan optimize:clear
            php artisan optimize
